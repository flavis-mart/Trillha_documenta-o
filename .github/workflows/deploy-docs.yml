name: Deploy MkDocs com Versões

on:
  push:
    branches:
      - main 

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRÍTICO: O mike precisa do histórico do Git para gerenciar as versões

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material mike
          
      - name: Configurar usuário do Git (necessário para o bot fazer o commit)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Deploy da versão de desenvolvimento
        run: mike deploy --push dev